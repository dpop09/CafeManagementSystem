<div class="container">
    <div class="p-5">
        <table class="table">
            <thead>
                <th scope="col">Id</th>
                <th scope="col">Name</th>
                <th scope="col">Email</th>
                <th scope="col">Contact Number</th>
                <th scope="col">Status</th>
            </thead>
            <tbody>
                @for (user of usersData(); track user.id) {
                <tr>
                    <td>{{ user.id }}</td>
                    <td>{{ user.name }}</td>
                    <td>{{ user.email }}</td>
                    <td>{{ user.contactNumber }}</td>
                    <td>{{ user.status }}</td>
                </tr>
                } @empty {
                <tr>
                    <td colspan="5" class="text-center">There are no recorded users.</td>
                </tr>
                }
            </tbody>
        </table>
    </div>
</div>
