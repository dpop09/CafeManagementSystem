<div class="signup-container">
  <div class="container py-5 h-100">
    <div class="row d-flex justify-content-center align-items-center h-100">
      <div class="col-12 col-md-8 col-lg-6 col-xl-5">
        <div class="card shadow-lg signup-card text-black">
          <div class="card-body p-5">
            <div class="mb-md-5 mt-md-4 pb-5">

              <div class="text-center mb-5">
                <i class="bi bi-cup-hot fs-1 text-primary"></i>
                <h2 class="fw-bold mb-2 text-uppercase">CafeMaster Pro</h2>
                <p class="text-muted mb-4">Create your staff account</p>
              </div>

              <form action="#">
                <div class="mb-4">
                  <label class="form-label fw-semibold" for="username">Username</label>
                  <div class="input-group">
                    <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
                    <input type="text" id="username" name="username" class="form-control form-control-lg" placeholder="johndoe_cafe" required />
                  </div>
                  <div class="form-text">Choose a unique identifier.</div>
                </div>

                <div class="mb-4">
                  <label class="form-label fw-semibold" for="contact">Contact Number</label>
                  <div class="input-group">
                    <span class="input-group-text bg-light"><i class="bi bi-telephone"></i></span>
                    <input type="tel" id="contact" name="contact" class="form-control form-control-lg" placeholder="(555) 123-4567" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" required />
                  </div>
                </div>

                <div class="mb-4">
                  <label class="form-label fw-semibold" for="email">Email address</label>
                  <div class="input-group">
                    <span class="input-group-text bg-light"><i class="bi bi-envelope"></i></span>
                    <input type="email" id="email" name="email" class="form-control form-control-lg" placeholder="john.doe@cafemaster.com" required />
                  </div>
                </div>

                <div class="mb-5">
                  <label class="form-label fw-semibold" for="password">Password</label>
                  <div class="input-group">
                    <span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
                    <input type="password" id="password" name="password" class="form-control form-control-lg" placeholder="Minimum 8 characters" minlength="8" required />
                  </div>
                  <div class="form-text">Must contain letters and numbers.</div>
                </div>

                <div class="d-grid gap-2">
                  <button class="btn btn-primary btn-lg" type="submit">Create Account</button>
                </div>
              </form>
              
            </div>

            <div class="text-center">
              <p class="mb-0 text-muted">Already have an account? <a routerLink="/login" class="text-primary fw-bold text-decoration-none">Login</a></p>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>
</div>
