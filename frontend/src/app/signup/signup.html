<div class="signup-container">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card shadow-lg signup-card text-black">
                    <div class="card-body p-5">

                        <div class="text-center mb-4">
                            <i class="bi bi-cup-hot fs-1 text-primary"></i>
                            <h2 class="fw-bold mb-2 text-uppercase">Pop's Cafe</h2>
                            <p class="text-muted mb-4">Create your account</p>
                        </div>

                        <form [formGroup]="signupForm" (ngSubmit)="onSignup()">
                            <div class="form-floating mb-4">
                                <input type="text" class="form-control" formControlName="name" id="name" name="name"
                                    required />
                                <label for="name">Name</label>
                            </div>

                            <div class="form-floating mb-4">
                                <input class="form-control" type="tel" id="contact" formControlName="contactNumber"
                                    name="contact" required />
                                <label for="contact">Contact Number</label>
                            </div>

                            <div class="form-floating mb-4">
                                <input class="form-control" type="text" id="email" formControlName="email" name="email"
                                    required />
                                <label for="email">Email address</label>
                            </div>

                            <div class="form-floating mb-4">
                                <input class="form-control" type="password" id="password" formControlName="password"
                                    name="password" required />
                                <label for="password">Password</label>
                            </div>

                            <div class="d-grid gap-2">
                                <button class="btn btn-primary btn-lg rounded-3 py-2 fw-bold" type="submit">Create
                                    Account</button>
                            </div>
                        </form>
                    </div>

                    <div class="text-center">
                        <p class="mb-0 text-muted pb-4">Already have an account?
                            <a routerLink="/login" class="text-primary fw-bold text-decoration-none">Login</a>
                        </p>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>
