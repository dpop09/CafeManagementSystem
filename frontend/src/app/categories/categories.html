<div class="container">
    <div class="p-5">
        <table class="table">
            <thead>
                <th scope="col">Id</th>
                <th scope="col">Name</th>
            </thead>
            <tbody>
                @for (category of categoriesData(); track category.id) {
                <tr>
                    <td>{{ category.id }}</td>
                    <td>{{ category.name }}</td>
                </tr>
                } @empty {
                <tr>
                    <td colspan="2" class="text-center">There are no recorded categories.</td>
                </tr>
                }
            </tbody>
        </table>
    </div>
</div>
