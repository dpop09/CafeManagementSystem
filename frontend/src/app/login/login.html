<div class="login-container">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-4">
        <div class="card shadow-lg border-0 rounded-4">
          <div class="card-body p-5">
            
            <div class="text-center mb-4">
              <h2 class="fw-bold">Welcome Back</h2>
              <p class="text-muted">Enter your cafe credentials</p>
            </div>

            <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
              <div class="form-floating mb-3">
                <input type="email" class="form-control" id="floatingEmail" formControlName="email">
                <label for="floatingEmail">Email address</label>
              </div>

              <div class="form-floating mb-4">
                <input type="password" class="form-control" id="floatingPassword" formControlName="password">
                <label for="floatingPassword">Password</label>
              </div>

              <div class="d-grid mb-3">
                <button class="btn btn-primary btn-lg rounded-3 py-2 fw-bold" type="submit">
                  Login
                </button>
              </div>

              <div class="text-center">
                <a href="#" class="text-decoration-none small text-muted">Forgot password?</a>
                <hr class="my-4">
                <p class="small mb-0">Don't have an account? 
                  <a routerLink="/signup" class="text-primary fw-bold text-decoration-none">Sign Up</a>
                </p>
              </div>
            </form>

          </div>
        </div>
      </div>
    </div>
  </div>
</div>
