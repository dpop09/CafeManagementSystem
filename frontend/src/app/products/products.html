<div class="container">
    <div class="p-5">
        <table class="table">
            <thead>
                <th scope="col">Id</th>
                <th scope="col">Category Id</th>
                <th scope="col">Name</th>
                <th scope="col">Description</th>
                <th scope="col">Price</th>
                <th scope="col">Status</th>
            </thead>
            <tbody>
                @for (product of productsData(); track product.id) {
                <tr>
                    <td>{{ product.id }}</td>
                    <td>{{ product.categoryId }}</td>
                    <td>{{ product.name }}</td>
                    <td>{{ product.description }}</td>
                    <td>{{ product.price }}</td>
                    <td>{{ product.status }}</td>
                </tr>
                } @empty {
                <tr>
                    <td colspan="5" class="text-center">There are no recorded products.</td>
                </tr>
                }
            </tbody>
        </table>
        <div class="row pt-5">
            <div class="col">
                <div class="row pb-4">
                    <div class="col">
                        <button class="btn btn-primary" (click)="this.formMode.set('add');">Add
                            Product</button>
                    </div>
                </div>
                <div class="row pb-4">
                    <div class="col">
                        <button class="btn btn-primary" (click)="this.formMode.set('update');">Update
                            Product</button>
                    </div>
                </div>
                <div class="row pb-4">
                    <div class="col">
                        <button class="btn btn-primary" (click)="this.formMode.set('updateStatus');">Update
                            Status</button>
                    </div>
                </div>
            </div>
            <div class="col-6">
                <form *ngIf="formMode() === 'add'" [formGroup]="addProductForm" (ngSubmit)="onAddProduct()">
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="floatingCategoryId" formControlName="categoryId">
                        <label for="floatingCategoryId">Category Id</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="floatingName" formControlName="name">
                        <label for="floatingName">Product Name</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="floatingDescription" formControlName="description">
                        <label for="floatingDescription">Product Description</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="floatingPrice" formControlName="price">
                        <label for="floatingPrice">Product Price</label>
                    </div>
                    <div class="d-grid mb-3">
                        <button class="btn btn-primary btn-lg rounded-3 py-2 fw-bold" type="submit">
                            Add Product
                        </button>
                    </div>
                </form>
                <form *ngIf="formMode() === 'update'" [formGroup]="updateProductForm" (ngSubmit)="onUpdateProduct()">
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="floatingId" formControlName="id">
                        <label for="floatingId">Product Id</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="floatingCategoryId" formControlName="categoryId">
                        <label for="floatingCategoryId">Category Id</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="floatingName" formControlName="name">
                        <label for="floatingName">Product Name</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="floatingDescription" formControlName="description">
                        <label for="floatingDescription">Product Description</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="floatingPrice" formControlName="price">
                        <label for="floatingPrice">Product Price</label>
                    </div>
                    <div class="d-grid mb-3">
                        <button class="btn btn-primary btn-lg rounded-3 py-2 fw-bold" type="submit">
                            Update Product
                        </button>
                    </div>
                </form>
                <form *ngIf="formMode() === 'updateStatus'" [formGroup]="updateProductStatusForm"
                    (ngSubmit)="onUpdateProductStatus()">
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="floatingId" formControlName="id">
                        <label for="floatingId">Product Id</label>
                    </div>
                    <div class="form-floating mb-3">
                        <select class="form-control" id="floatingStatus" formControlName="status">
                            <option>True</option>
                            <option>False</option>
                        </select>
                        <label for="floatingStatus">Product Status</label>
                    </div>
                    <div class="d-grid mb-3">
                        <button class="btn btn-primary btn-lg rounded-3 py-2 fw-bold" type="submit">
                            Update Product Status
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
